<!DOCTYPE html>
<html>
<body>

<div id="c" style="height:200px;overflow:auto;border:1px solid #000"></div>
<input id="i" placeholder="Type..." />
<button onclick="s()">Send</button>

<script>
function a(t){c.innerHTML+=t+"<br>";c.scrollTop=c.scrollHeight}
function r(t){
  t=t.toLowerCase();
  if(t=="hi")return"hello";
  if(t.includes("time"))return new Date().toLocaleTimeString();
  return"I don't understand";
}
function s(){
  let t=i.value.trim();
  if(!t)return;
  a("You: "+t);
  a("Bot: "+r(t));
  i.value="";
}
</script>

</body>
</html>
